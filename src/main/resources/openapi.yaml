openapi: 3.0.4
info:
  title: E-Commerce API
  description: Mini Amazon/Flipkart Backend API
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Products
  - name: Cart
  - name: Orders

paths:

  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      tags: [Products]
      summary: Add product (Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product added
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/Product'

  /products/{name}:
    get:
      tags: [Products]
      summary: Get product by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    delete:
      tags: [Products]
      summary: Delete product (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Product deleted

  /cart:
    get:
      tags: [Cart]
      summary: Get user cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /cart/add:
    post:
      tags: [Cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        '201':
          description: Item added
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/Cart'
            

  /cart/remove/{productId}:
    delete:
      tags: [Cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item removed

  /orders/checkout:
    post:
      tags: [Orders]
      summary: Checkout cart and create order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders:
    get:
      tags: [Orders]
      summary: Get order history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number

    CartItemRequest:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: integer

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        totalPrice:
          type: number

    CheckoutRequest:
      type: object
      properties:
        cartId:
          type: string
        paymentMethod:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        totalPrice:
          type: number
        status:
          type: string