openapi: 3.0.4
info:
  title: E-Commerce API
  description: Mini Amazon/Flipkart Backend API
  version: 1.0.0

servers:
  - url: http://localhost:8080

# ✅ APPLY SECURITY GLOBALLY (IMPORTANT)
security:
  - BearerAuth: []

tags:
  - name: Products
  - name: Cart
  - name: Orders

paths:

  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      tags: [Products]
      summary: Add product (Admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/{name}:
    get:
      tags: [Products]
      summary: Get product by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

    delete:
      tags: [Products]
      summary: Delete product (Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Product deleted

  /cart:
    get:
      tags: [Cart]
      summary: Get logged-in user cart
      responses:
        '200':
          description: Cart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /cart/add:
    post:
      tags: [Cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        '200':
          description: Item added or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /cart/remove/{productName}:
    delete:
      tags: [Cart]
      summary: Remove item from cart
      parameters:
        - name: productName
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item removed

  /cart/clear:
    delete:
      tags: [Cart]
      summary: Clear entire cart
      responses:
        '204':
          description: Cart cleared

  /orders/checkout:
    post:
      tags: [Orders]
      summary: Checkout cart and create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders:
    get:
      tags: [Orders]
      summary: Get order history for logged-in user
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

components:

  securitySchemes:
    BearerAuth:   # ✅ MUST MATCH SwaggerConfig
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number

    CartItem:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
        subtotal:
          type: number

    CartItemRequest:
      type: object
      properties:
        productName:
          type: string
        quantity:
          type: integer
          example: 1

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalPrice:
          type: number

    CheckoutRequest:
      type: object
      required:
        - paymentMethod
      properties:
        paymentMethod:
          type: string
          enum:
            - CASH_ON_DELIVERY
            - UPI
            - CARD

    OrderItem:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
        price:
          type: number

    Order:
      type: object
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalPrice:
          type: number
        status:
          type: string
          enum:
            - CREATED
            - CONFIRMED
            - SHIPPED
            - DELIVERED
            - CANCELLED
        paymentMethod:   # ✅ NEW (IMPORTANT)
          type: string
          enum:
            - CASH_ON_DELIVERY
            - UPI
            - CARD