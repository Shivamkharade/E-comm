spring.application.name=E-Comm

spring.datasource.url=jdbc:mysql://localhost:3306/ecomm
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

jwt.secretkey=${KEY}

spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.jpa.defer-datasource-initialization=true

spring.cloud.stream.bindings.userJwtLogin-out-0.destination=ecomm/user/login
spring.cloud.stream.bindings.userRegistrationMail-out-0.destination=ecomm/user/registration/user
spring.cloud.stream.default-binder=solace

solace.java.host=tcp://localhost:55555
solace.java.msg-vpn=default
solace.java.client-username=admin
solace.java.client-password=admin

server.port=8090
